spring:
  datasource:
    url: ${TEST_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bookshelf}
    username: ${TEST_DATASOURCE_USERNAME:bookshelf}
    password: ${TEST_DATASOURCE_PASSWORD:bookshelf}
  jooq:
    sql-dialect: POSTGRES

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

server:
  error:
    include-message: always
