name: CI

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - "*.md"
      - "**/*.md"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "*.md"
      - "**/*.md"
      - "docs/**"

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run tests
        run: docker compose run --rm test

      - name: Cleanup Docker Compose resources
        if: always()
        run: docker compose down -v --remove-orphans
