services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: bookshelf
      POSTGRES_USER: bookshelf
      POSTGRES_PASSWORD: bookshelf
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookshelf -d bookshelf"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    image: gradle:8.10.2-jdk21
    working_dir: /workspace
    command: ["gradle", "bootRun", "--no-daemon"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bookshelf
      SPRING_DATASOURCE_USERNAME: bookshelf
      SPRING_DATASOURCE_PASSWORD: bookshelf
    ports:
      - "8080:8080"
    volumes:
      - .:/workspace
      - gradle-cache:/home/gradle/.gradle

  test:
    image: gradle:8.10.2-jdk21
    working_dir: /workspace
    command: ["gradle", "test", "--no-daemon"]
    volumes:
      - .:/workspace
      - gradle-cache:/home/gradle/.gradle

volumes:
  postgres-data:
  gradle-cache:
